version: "3.8"
services:
  postgres:
    image: postgres:15
    container_name: support_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: assistants_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant
    container_name: support_qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  # Если у тебя есть backend сервис в docker-compose, добавь это:
  # backend:
  #   build: ./backend
  #   container_name: support_backend
  #   restart: always
  #   ports:
  #     - "4000:4000"
  #   volumes:
  #     - ./backend/uploads:/app/uploads  # ← Важно для сохранения файлов
  #   depends_on:
  #     - postgres
  #     - qdrant
  #   environment:
  #     DATABASE_URL: postgresql://postgres:password@postgres:5432/assistants_db
  #     QDRANT_URL: http://qdrant:6333

volumes:
  pgdata:
  qdrant_storage: