services:
  postgres:
    image: postgres:15
    container_name: support_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: support_qdrant
    restart: always
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - app_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: support_backend
    restart: always
    depends_on:
      - postgres
      - qdrant
    ports:
      - "127.0.0.1:8000:8000"  
    environment:
      NODE_ENV: production
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      QDRANT_URL: http://qdrant:6333
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}

      # === YOOKASSA ===
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY}
      YOOKASSA_SHOP_ID_REAL: ${YOOKASSA_SHOP_ID_REAL}
      YOOKASSA_SECRET_KEY_REAL: ${YOOKASSA_SECRET_KEY_REAL}

      # === Подписки ===
      SUBSCRIPTION_TEST_MODE: ${SUBSCRIPTION_TEST_MODE}
      SUBSCRIPTION_TEST_PERIOD_MINUTES: ${SUBSCRIPTION_TEST_PERIOD_MINUTES}
      SUBSCRIPTION_CRON_INTERVAL_MINUTES: ${SUBSCRIPTION_CRON_INTERVAL_MINUTES}

      YANDEX_API_KEY: ${YANDEX_API_KEY}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      BACKEND_URL: ${BACKEND_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      NOTIFICATION_BOT_TOKEN: ${NOTIFICATION_BOT_TOKEN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      POSTBOX_FROM_EMAIL: ${POSTBOX_FROM_EMAIL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      POSTBOX_SMTP_USER: ${POSTBOX_SMTP_USER}
      POSTBOX_SMTP_PASS: ${POSTBOX_SMTP_PASS}
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - app_network
    # Добавляем retry логику в самом приложении
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: support_frontend
    restart: always
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SUPPORT_ASSISTANT_ID: ${NEXT_PUBLIC_SUPPORT_ASSISTANT_ID}
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: support_nginx
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./frontend/.next/static:/usr/share/nginx/html/_next/static:ro
    networks:
      - app_network

volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local

networks:
  app_network:
    driver: bridge