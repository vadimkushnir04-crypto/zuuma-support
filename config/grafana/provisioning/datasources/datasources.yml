apiVersion: 1

datasources:
  # ============================================
  # Loki - Logs
  # ============================================
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      maxLines: 1000
      derivedFields:
        # Создаем ссылки на трейсы (если используете tracing)
        - datasourceUid: tempo
          matcherRegex: "traceID=(\\w+)"
          name: TraceID
          url: '$${__value.raw}'
    isDefault: true
    editable: true

  # ============================================
  # Prometheus - Metrics
  # ============================================
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    jsonData:
      timeInterval: '30s'
      queryTimeout: '60s'
      httpMethod: POST
    editable: true

  # ============================================
  # Loki для Errors (отдельный source для удобства)
  # ============================================
  - name: Loki-Errors
    type: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      maxLines: 500
      # Фильтр по умолчанию только ошибки
      queryOverrides:
        query: '{level="error"}'
    editable: true
