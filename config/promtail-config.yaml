server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ============================================
  # Docker контейнеры (через Docker socket)
  # ============================================
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    
    relabel_configs:
      # Оставляем только контейнеры с нашими сервисами
      - source_labels: ['__meta_docker_container_name']
        regex: '.*(support_backend|support_frontend|support_nginx).*'
        action: keep
      
      # Имя контейнера
      - source_labels: ['__meta_docker_container_name']
        target_label: container
        replacement: '$1'
      
      # Stream (stdout/stderr)
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
      
      # Добавляем job label
      - source_labels: ['__meta_docker_container_name']
        regex: '.*(backend).*'
        target_label: job
        replacement: 'nestjs'
      
      - source_labels: ['__meta_docker_container_name']
        regex: '.*(frontend).*'
        target_label: job
        replacement: 'nextjs'
      
      - source_labels: ['__meta_docker_container_name']
        regex: '.*(nginx).*'
        target_label: job
        replacement: 'nginx'

  # ============================================
  # System logs
  # ============================================
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          __path__: /var/log/syslog