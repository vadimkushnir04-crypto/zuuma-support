server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ============================================
  # NestJS Application Logs (JSON format)
  # ============================================
  - job_name: nestjs-app
    static_configs:
      - targets:
          - localhost
        labels:
          job: nestjs
          app: backend
          __path__: /app/logs/*.log
    
    pipeline_stages:
      # Парсинг JSON логов
      - json:
          expressions:
            level: level
            message: message
            timestamp: timestamp
            context: context
            trace: trace
            error: error
            stack: stack
      
      # Извлечение метаданных
      - labels:
          level:
          context:
      
      # Добавление severity для ошибок
      - template:
          source: severity
          template: '{{ if eq .level "error" }}critical{{ else if eq .level "warn" }}warning{{ else }}info{{ end }}'
      
      # Форматирование timestamp
      - timestamp:
          source: timestamp
          format: RFC3339

  # ============================================
  # Error Logs Only (для быстрого поиска)
  # ============================================
  - job_name: nestjs-errors
    static_configs:
      - targets:
          - localhost
        labels:
          job: nestjs-errors
          app: backend
          severity: error
          __path__: /app/logs/error-*.log
    
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            error: error
            stack: stack
            context: context
      
      - labels:
          level:
          context:
      
      - timestamp:
          source: timestamp
          format: RFC3339

  # ============================================
  # Audit Logs (специальная обработка)
  # ============================================
  - job_name: nestjs-audit
    static_configs:
      - targets:
          - localhost
        labels:
          job: audit
          app: backend
          __path__: /app/logs/audit-*.log
    
    pipeline_stages:
      - json:
          expressions:
            userId: userId
            action: action
            ipAddress: ipAddress
            status: status
      
      - labels:
          userId:
          action:
          status:

  # ============================================
  # Docker Container Logs
  # ============================================
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["logging=promtail"]
    
    relabel_configs:
      # Имя контейнера
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      
      # ID контейнера
      - source_labels: ['__meta_docker_container_id']
        target_label: 'container_id'
      
      # Image контейнера
      - source_labels: ['__meta_docker_container_image']
        target_label: 'image'
      
      # Log stream
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'logstream'
    
    pipeline_stages:
      # Попытка распарсить JSON (если есть)
      - json:
          expressions:
            level: level
            message: message
          source: log
      
      # Детект ошибок по ключевым словам
      - match:
          selector: '{job="docker"}'
          stages:
            - regex:
                expression: '(?i)(error|exception|fatal|panic|fail)'
            - labels:
                error: "true"

  # ============================================
  # System Logs (опционально)
  # ============================================
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          __path__: /var/log/{syslog,messages,*.log}
    
    pipeline_stages:
      # Парсинг syslog формата
      - regex:
          expression: '^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+(?P<process>\S+):\s+(?P<message>.*)$'
      
      - labels:
          hostname:
          process:
      
      - timestamp:
          source: timestamp
          format: Jan 02 15:04:05

  # ============================================
  # Nginx Access Logs (если используете)
  # ============================================
  - job_name: nginx-access
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx-access
          __path__: /var/log/nginx/access.log
    
    pipeline_stages:
      # Парсинг Nginx combined формата
      - regex:
          expression: '^(?P<remote_addr>[\d\.]+) - (?P<remote_user>[^\s]+) \[(?P<time_local>[^\]]+)\] "(?P<method>\S+) (?P<path>\S+) (?P<protocol>\S+)" (?P<status>\d+) (?P<body_bytes_sent>\d+) "(?P<http_referer>[^"]*)" "(?P<http_user_agent>[^"]*)"'
      
      - labels:
          method:
          status:
          path:
      
      - timestamp:
          source: time_local
          format: 02/Jan/2006:15:04:05 -0700

  # ============================================
  # Nginx Error Logs
  # ============================================
  - job_name: nginx-error
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx-error
          severity: error
          __path__: /var/log/nginx/error.log
    
    pipeline_stages:
      - regex:
          expression: '^(?P<time>\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2}) \[(?P<level>\w+)\] (?P<message>.*)'
      
      - labels:
          level:
      
      - timestamp:
          source: time
          format: 2006/01/02 15:04:05
